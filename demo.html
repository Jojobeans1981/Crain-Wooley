<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;600;700&family=Cormorant+Garamond:wght@700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0c0f;
      color: #e8e2d6;
      font-family: 'IBM Plex Sans', sans-serif;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background:
        repeating-linear-gradient(0deg, transparent, transparent 39px, #1a1d24 39px, #1a1d24 40px),
        repeating-linear-gradient(90deg, transparent, transparent 39px, #1a1d24 39px, #1a1d24 40px);
      pointer-events: none;
      z-index: 0;
    }

    .slide-container {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
    }

    .slide {
      position: absolute;
      width: 100%;
      height: 100%;
      padding: 80px 100px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      opacity: 0;
      transform: translateX(100px) scale(0.98);
      transition: opacity 0.6s ease, transform 0.6s ease;
      pointer-events: none;
      background: #0a0c0f;
    }

    .slide.active {
      opacity: 1;
      transform: translateX(0) scale(1);
      pointer-events: auto;
    }

    .slide.prev {
      transform: translateX(-100px) scale(0.98);
    }

    /* Progress bar */
    .progress-bar {
      position: fixed;
      top: 0;
      left: 0;
      height: 4px;
      background: linear-gradient(90deg, #63c0ff, #c5933a);
      z-index: 1000;
      transition: width 0.6s ease;
    }

    /* Slide counter */
    .counter {
      position: fixed;
      bottom: 30px;
      right: 40px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 14px;
      color: #6b7b8e;
      z-index: 100;
    }

    /* Navigation hints */
    .nav-hint {
      position: fixed;
      bottom: 30px;
      left: 40px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      color: #6b7b8e;
      opacity: 0.6;
      z-index: 100;
    }

    /* Title slide */
    .title-slide {
      text-align: center;
      background: linear-gradient(135deg, rgba(10, 12, 15, 0.95) 0%, rgba(26, 29, 36, 0.5) 100%);
    }

    .title-slide h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 72px;
      margin-bottom: 20px;
      background: linear-gradient(135deg, #63c0ff, #c5933a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: slideUp 0.8s ease;
    }

    .title-slide .tagline {
      font-size: 24px;
      color: #c5933a;
      margin-bottom: 60px;
      animation: slideUp 0.8s ease 0.2s both;
    }

    .badge-row {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 60px;
      animation: slideUp 0.8s ease 0.4s both;
    }

    .badge {
      background: #1a1d24;
      border: 1px solid #2a2d35;
      padding: 10px 16px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      color: #63c0ff;
      border-radius: 0;
    }

    /* Regular slides */
    .slide h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 54px;
      margin-bottom: 40px;
      color: #c5933a;
      border-left: 4px solid #63c0ff;
      padding-left: 20px;
      animation: slideInLeft 0.6s ease;
    }

    .slide h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 36px;
      margin-bottom: 30px;
      color: #63c0ff;
      animation: slideInLeft 0.6s ease;
    }

    .content {
      font-size: 18px;
      line-height: 1.8;
      color: #e8e2d6;
      animation: fadeIn 0.8s ease 0.3s both;
    }

    .content p {
      margin-bottom: 20px;
    }

    .content ul {
      list-style: none;
      margin-left: 40px;
    }

    .content li {
      margin-bottom: 16px;
      position: relative;
      padding-left: 20px;
    }

    .content li:before {
      content: '▪';
      position: absolute;
      left: 0;
      color: #63c0ff;
    }

    /* Speaker notes */
    .speaker-notes {
      position: absolute;
      bottom: 80px;
      left: 100px;
      right: 100px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: rgba(107, 123, 142, 0.4);
      line-height: 1.5;
      max-height: 60px;
      overflow: hidden;
    }

    /* Two-column layout */
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      align-items: center;
    }

    .col-visual {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 400px;
    }

    /* Status grid */
    .status-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 30px;
      margin: 40px 0;
      animation: fadeIn 0.8s ease 0.3s both;
    }

    .status-item {
      background: #1a1d24;
      border: 1px solid #2a2d35;
      padding: 24px;
      text-align: center;
      border-radius: 0;
    }

    .status-item .label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      color: #6b7b8e;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .status-item .value {
      font-size: 32px;
      font-weight: 700;
      color: #63c0ff;
      font-family: 'IBM Plex Mono', monospace;
    }

    .status-item.done .value {
      color: #3a7d5a;
    }

    .status-item.pending .value {
      color: #c5933a;
    }

    .status-item.blocked .value {
      color: #d95d39;
    }

    /* Diagram styles */
    .flow-diagram {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin: 40px 0;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 14px;
      animation: fadeIn 0.8s ease 0.3s both;
    }

    .flow-box {
      background: #1a1d24;
      border: 2px solid #63c0ff;
      padding: 16px 24px;
      min-width: 140px;
      text-align: center;
      border-radius: 0;
      color: #e8e2d6;
    }

    .flow-arrow {
      color: #63c0ff;
      font-size: 24px;
    }

    /* Feature cards */
    .feature-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 30px;
      margin: 40px 0;
      animation: fadeIn 0.8s ease 0.3s both;
    }

    .feature-card {
      background: #1a1d24;
      border: 1px solid #2a2d35;
      padding: 30px;
      border-radius: 0;
    }

    .feature-card h4 {
      color: #63c0ff;
      margin-bottom: 12px;
      font-size: 16px;
      font-family: 'IBM Plex Mono', monospace;
      text-transform: uppercase;
    }

    .feature-card p {
      font-size: 14px;
      line-height: 1.6;
      color: #c5c5c5;
    }

    /* Tech stack visual */
    .stack-layer {
      background: #1a1d24;
      border: 1px solid #2a2d35;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 0;
      font-family: 'IBM Plex Mono', monospace;
      animation: slideUp 0.6s ease;
    }

    .stack-layer-title {
      color: #63c0ff;
      font-size: 12px;
      text-transform: uppercase;
      margin-bottom: 10px;
      font-weight: 600;
    }

    .stack-layer-items {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .stack-item {
      background: #0a0c0f;
      border: 1px solid #2a2d35;
      padding: 8px 12px;
      font-size: 12px;
      color: #e8e2d6;
    }

    /* Animations */
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slideInLeft {
      from {
        opacity: 0;
        transform: translateX(-30px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    /* Timeline */
    .timeline {
      position: relative;
      padding: 40px 0;
      margin: 40px 0;
      animation: fadeIn 0.8s ease 0.3s both;
    }

    .timeline-item {
      display: flex;
      gap: 30px;
      margin-bottom: 30px;
      align-items: flex-start;
    }

    .timeline-marker {
      background: #63c0ff;
      width: 8px;
      height: 8px;
      margin-top: 6px;
      flex-shrink: 0;
    }

    .timeline-marker.done {
      background: #3a7d5a;
    }

    .timeline-marker.pending {
      background: #c5933a;
    }

    .timeline-content {
      flex: 1;
    }

    .timeline-content strong {
      color: #63c0ff;
      display: block;
      margin-bottom: 4px;
      font-family: 'IBM Plex Mono', monospace;
    }

    .timeline-content p {
      color: #c5c5c5;
      font-size: 14px;
    }

    /* Conclusion slide */
    .conclusion-slide {
      text-align: center;
    }

    .conclusion-slide h2 {
      border: none;
      padding: 0;
      font-size: 48px;
      margin-bottom: 40px;
    }

    .conclusion-metric {
      font-size: 20px;
      margin-bottom: 16px;
      color: #c5c5c5;
    }

    .conclusion-metric strong {
      color: #63c0ff;
      font-family: 'IBM Plex Mono', monospace;
    }

    .team-credit {
      margin-top: 80px;
      font-size: 14px;
      color: #6b7b8e;
      font-family: 'IBM Plex Mono', monospace;
    }
  </style>
</head>

    let currentSlide = 0;

    function renderSlide(index) {
      const container = document.getElementById('slideContainer');
      container.innerHTML = '';

      // Remove active from all
      document.querySelectorAll('.slide').forEach(s => s.classList.remove('active', 'prev'));

      // Show previous slide if moving forward (for animation effect)
      if (currentSlide > index && slides[currentSlide]) {
        const prevSlide = document.createElement('div');
        prevSlide.className = 'slide prev';
        prevSlide.innerHTML = slides[currentSlide].html;
        container.appendChild(prevSlide);
      }

      // Show current slide
      const slide = document.createElement('div');
      slide.className = 'slide active';
      slide.innerHTML = slides[index].html;
      container.appendChild(slide);

      // Update counter
      document.getElementById('counter').textContent = `${index + 1} / ${slides.length}`;

      // Update progress bar
      const progress = ((index + 1) / slides.length) * 100;
      document.getElementById('progressBar').style.width = progress + '%';
    }

    function nextSlide() {
      if (currentSlide < slides.length - 1) {
        currentSlide++;
        renderSlide(currentSlide);
      }
    }

    function prevSlide() {
      if (currentSlide > 0) {
        currentSlide--;
        renderSlide(currentSlide);
      }
    }

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ') {
        e.preventDefault();
        nextSlide();
      } else if (e.key === 'ArrowLeft') {
        e.preventDefault();
        prevSlide();
      } else if (e.key === 'Home') {
        e.preventDefault();
        currentSlide = 0;
        renderSlide(currentSlide);
      } else if (e.key === 'End') {
        e.preventDefault();
        currentSlide = slides.length - 1;
        renderSlide(currentSlide);
      }
    });

    // Initial render
    renderSlide(0);
  </script>
